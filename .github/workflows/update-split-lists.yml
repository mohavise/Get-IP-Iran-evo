name: Update split IP lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate lists and checksums
        run: |
          chmod +x scripts/get.sh
          ./scripts/get.sh split

          sha256sum list-ipv4.rsc > list-ipv4-checksum.sha256
          sha256sum list-ipv6.rsc > list-ipv6-checksum.sha256

          sha256sum --check list-ipv4-checksum.sha256
          sha256sum --check list-ipv6-checksum.sha256

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add list-ipv4.rsc list-ipv6.rsc \
                  list-ipv4-checksum.sha256 list-ipv6-checksum.sha256

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Automatic IP list update"
          git push
