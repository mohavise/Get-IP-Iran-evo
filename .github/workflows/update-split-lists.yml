name: Update split IP lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate lists
        run: |
          chmod +x scripts/get.sh
          ./scripts/get.sh split

      - name: Validate lists
        shell: python
        run: |
          import ipaddress
          import pathlib
          import re
          import subprocess

          configs = {
              "list-ipv4.rsc": (4, "NoNAT", 1000),
              "list-ipv6.rsc": (6, "IRv6", 100),
          }

          pattern = re.compile(r"add address=([^ ]+) list=([^} ]+)")
          generated = {}

          for filename, (version, expected_list, minimum) in configs.items():
              text = pathlib.Path(filename).read_text(encoding="utf-8")
              entries = pattern.findall(text)

              if len(entries) < minimum:
                  raise SystemExit(f"{filename}: only {len(entries)} entries; minimum is {minimum}")

              networks = []
              for value, list_name in entries:
                  if list_name != expected_list:
                      raise SystemExit(f"{filename}: unexpected list name {list_name}")
                  try:
                      network = ipaddress.ip_network(value, strict=False)
                  except ValueError as error:
                      raise SystemExit(f"{filename}: invalid CIDR {value}: {error}")
                  if network.version != version:
                      raise SystemExit(f"{filename}: wrong IP family for {value}")
                  networks.append(str(network))

              if len(networks) != len(set(networks)):
                  raise SystemExit(f"{filename}: duplicate networks detected")

              generated[filename] = set(networks)

              try:
                  old = subprocess.check_output(
                      ["git", "show", f"HEAD:{filename}"], text=True
                  )
                  old_count = len(pattern.findall(old))
              except subprocess.CalledProcessError:
                  old_count = 0

              if old_count and len(entries) < old_count * 0.8:
                  raise SystemExit(
                      f"{filename}: count dropped from {old_count} to {len(entries)}"
                  )

              print(f"{filename}: validated {len(entries)} unique networks")

          supplement_path = pathlib.Path("data/ipv4-supplements.txt")
          if supplement_path.exists():
              supplements = []
              for line_number, raw in enumerate(
                  supplement_path.read_text(encoding="utf-8").splitlines(), start=1
              ):
                  value = raw.split("#", 1)[0].strip()
                  if not value:
                      continue
                  try:
                      network = ipaddress.ip_network(value, strict=True)
                  except ValueError as error:
                      raise SystemExit(
                          f"{supplement_path}:{line_number}: invalid IPv4 CIDR {value}: {error}"
                      )
                  if network.version != 4:
                      raise SystemExit(
                          f"{supplement_path}:{line_number}: not an IPv4 network: {value}"
                      )
                  supplements.append(str(network))

              if len(supplements) != len(set(supplements)):
                  raise SystemExit(f"{supplement_path}: duplicate supplemental networks")

              missing = sorted(set(supplements) - generated["list-ipv4.rsc"])
              if missing:
                  raise SystemExit(
                      "Supplemental IPv4 networks missing from generated output: "
                      + ", ".join(missing)
                  )

              print(f"{supplement_path}: validated {len(supplements)} supplemental networks")

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add list-ipv4.rsc list-ipv6.rsc

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Automatic IP list update"
          git push
